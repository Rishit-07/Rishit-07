name: Update profile assets

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch contribution data
        run: python scripts/fetch_contributions.py

      - name: Render contribution heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit updated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          if git diff --cached --quiet; then
            echo "No profile asset changes to commit."
          else
            git commit -m "Update contribution heatmap"
            git push
          fi
