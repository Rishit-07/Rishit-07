<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" role="img" aria-label="Profile info terminal card">
  <rect width="100%" height="100%" rx="18" fill="#0d1117" stroke="#30363d" stroke-width="2" />
  <rect x="1" y="1" width="758" height="52" rx="17" fill="#161b22" />
  <circle cx="32" cy="27" r="7" fill="#ff7b72" />
  <circle cx="56" cy="27" r="7" fill="#f2cc60" />
  <circle cx="80" cy="27" r="7" fill="#3fb950" />
  <text x="112" y="32" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="14">rishit@github-profile: ~/animated-profile</text>
  <g font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="18">
    <text x="28" y="82" fill="#8b949e">cat profile.info</text>
    <g opacity="0" transform="translate(0 8)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.20s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" dur="0.45s" begin="0.20s" fill="freeze" />
      <text x="30" y="112" fill="#7ee787">$</text>
      <text x="54" y="112" fill="#79c0ff">name</text>
      <text x="216" y="112" fill="#c9d1d9">Rishit</text>
    </g>
    <g opacity="0" transform="translate(0 8)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.34s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" dur="0.45s" begin="0.34s" fill="freeze" />
      <text x="30" y="146" fill="#7ee787">$</text>
      <text x="54" y="146" fill="#79c0ff">role</text>
      <text x="216" y="146" fill="#c9d1d9">Full-stack Developer</text>
    </g>
    <g opacity="0" transform="translate(0 8)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.48s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" dur="0.45s" begin="0.48s" fill="freeze" />
      <text x="30" y="180" fill="#7ee787">$</text>
      <text x="54" y="180" fill="#79c0ff">languages</text>
      <text x="216" y="180" fill="#c9d1d9">Python, Java, JavaScript</text>
    </g>
    <g opacity="0" transform="translate(0 8)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.62s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" dur="0.45s" begin="0.62s" fill="freeze" />
      <text x="30" y="214" fill="#7ee787">$</text>
      <text x="54" y="214" fill="#79c0ff">stack</text>
      <text x="216" y="214" fill="#c9d1d9">MERN, OpenCV, GitHub Actions</text>
    </g>
    <g opacity="0" transform="translate(0 8)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.76s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" dur="0.45s" begin="0.76s" fill="freeze" />
      <text x="30" y="248" fill="#7ee787">$</text>
      <text x="54" y="248" fill="#79c0ff">editor</text>
      <text x="216" y="248" fill="#c9d1d9">VS Code</text>
    </g>
    <g opacity="0" transform="translate(0 8)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.90s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" dur="0.45s" begin="0.90s" fill="freeze" />
      <text x="30" y="282" fill="#7ee787">$</text>
      <text x="54" y="282" fill="#79c0ff">current_focus</text>
      <text x="216" y="282" fill="#c9d1d9">Animated GitHub profile systems</text>
    </g>
  </g>
</svg>
